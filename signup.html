<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="signup-container">

    <!-- LEFT -->
    <div class="signup-left">
        <div class="signup-nav">
            <img src="./Media/logo0.svg" alt="logo">
        </div>

        <div class="signup-box">
            <h1>Start your investment journey</h1>
            <p>Got an account? <a href="#">Sign In</a></p>

            <button class="signup-google-btn">
                <img src="./Media/google-img.svg" alt="">
                Sign up with Google
            </button>

            <div class="signup-divider">
                <hr><span>or</span>
                <hr>
            </div>

            <input type="email" placeholder="Email Address">

            <button class="signup-continue">Continue</button>
        </div>

         <div class="signup-footer">
                <p><img src="./Media/sec-logo.uViKvy1J.png" alt="">Cowrywise is licensed by the SEC</p>
                <p class="helps"><a href="#">Need Help?</a></p>
            </div>
    </div>

    <!-- RIGHT -->
    <div class="signup-right">
        <div class="signup-right-box">
            <h2>Don't wait to start</h2>
            <p>See how much you could have earned in the past few years</p>
            <a href="#"><img src="./Media/star.svg" alt="" srcset=""> See what you missed <img src="./Media/angle-right.svg" alt="" srcset=""></a>
        </div>
    </div>

</div>
</body>
</html>
